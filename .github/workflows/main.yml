name: Build IPA and APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Inject Notification Script
        run: |
          python3 -c '
          import os
          file_path = "www/index.html"
          script = """
          <script>
            const notify = async (t, b, id, sch = null) => {
              const { LocalNotifications: ln } = Capacitor.Plugins;
              await ln.requestPermissions();
              await ln.schedule({ notifications: [{ title: t, body: b, id, schedule: sch }] });
            };
            const intrvl = setInterval(() => {
              const vm = window.scaffolding?.vm?.runtime;
              if (vm) {
                clearInterval(intrvl);
                notify("Mala Counter", "Complete your daily mala!", 12, { on: { hour: 12, minute: 0 }, repeats: true });
                vm.on("VAR_VALUE_UPDATE", (e) => {
                  if (e.name === "Malas Chanted Today:" && e.value == 1) 
                    notify("Mala Complete!", "Excellent progress on your first Mala.", 101);
                });
              }
            }, 1000);
          </script>
          """
          if os.path.exists(file_path):
              with open(file_path, "r") as f: content = f.read()
              if "</body>" in content:
                  with open(file_path, "w") as f: f.write(content.replace("</body>", script + "</body>"))
                  print("Patched index.html")
          '
          

      - name: Prepare Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/android @capacitor/local-notifications
          npx cap init "Mala Counter" "com.mala.counter" --web-dir www
          npx cap add ios
          npx cap add android
          npx cap sync

      - name: Force Landscape & Fullscreen
        run: |
          # iOS Landscape Lock
          plutil -replace UISupportedInterfaceOrientations -xml "<array><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>" ios/App/App/Info.plist
          
          # Android: Just force the landscape mode safely
          sed -i '' 's/android:screenOrientation="[^"]*"/android:screenOrientation="landscape"/' android/app/src/main/AndroidManifest.xml


      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Compile iOS
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Debug-iphoneos/App.app Payload/
          zip -r MalaCounter.ipa Payload
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mala-Counter-Builds
          path: |
            MalaCounter.ipa
            android/app/build/outputs/apk/debug/app-debug.apk

