<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:">
  <title>Mala Counter</title>
  <style>
    /* Fullscreen and Safe Area Fixes */
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000000;
      color: #ffffff;
      font-family: sans-serif;
    }

    /* Force the App and Canvas to fill the screen */
    #app, canvas {
      width: 100vw !important;
      height: 100vh !important;
      position: absolute;
      top: 0;
      left: 0;
      object-fit: contain;
    }

    [hidden] { display: none !important; }

    #loading, .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      z-index: 999;
    }

    .progress-bar-outer {
      border: 1px solid currentColor;
      height: 10px;
      width: 200px;
    }
    .progress-bar-inner {
      height: 100%;
      width: 0;
      background-color: currentColor;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="loading" class="screen">
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="loading-inner"></div></div>
  </div>

  <div id="error" class="screen" hidden>
    <h1>Error</h1>
    <p id="error-message"></p>
  </div>

  <script src="script.js"></script>
  <script>
    const appElement = document.getElementById('app');
    const loadingScreen = document.getElementById('loading');
    const loadingInner = document.getElementById('loading-inner');
    const errorScreen = document.getElementById('error');
    const errorScreenMessage = document.getElementById('error-message');

    const handleError = (error) => {
      console.error(error);
      errorScreen.hidden = false;
      errorScreenMessage.textContent = '' + error;
    };

    const setProgress = (progress) => {
      if (loadingInner) loadingInner.style.width = Math.min(progress * 100, 100) + '%';
    };

    const interpolate = (a, b, t) => a + t * (b - a);

    try {
      const scaffolding = new Scaffolding.Scaffolding();
      scaffolding.width = 480;
      scaffolding.height = 360;
      scaffolding.resizeMode = "preserve-ratio";
      scaffolding.setup();
      scaffolding.appendTo(appElement);

      const vm = scaffolding.vm;
      window.scaffolding = scaffolding;
      window.vm = vm;

      scaffolding.setAccentColor("#ff4c4c");
      vm.setTurboMode(false);
      
      // Basic runtime options
      if (vm.setRuntimeOptions) vm.setRuntimeOptions({ fencing: true, miscLimits: true, maxClones: 300 });

    } catch (e) {
      handleError(e);
    }
  </script>
  
  <script>
    const getProjectData = (function() {
      const storage = scaffolding.storage;
      storage.onprogress = (total, loaded) => {
        setProgress(interpolate(0.2, 0.98, loaded / total));
      };
      
      storage.addWebStore(
        [storage.AssetType.ImageVector, storage.AssetType.ImageBitmap, storage.AssetType.Sound, storage.AssetType.Font],
        (asset) => new URL('./assets/' + asset.assetId + '.' + asset.dataFormat, location).href
      );
      
      return () => new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.onload = () => resolve(xhr.response);
        xhr.onerror = () => reject(new Error('Project data failed to load.'));
        xhr.responseType = 'arraybuffer';
        xhr.open('GET', "./assets/project.json");
        xhr.send();
      });
    })();
  </script>

  <script>
    // Optimized Run Function: Force start and hide loader
    const run = async () => {
      try {
        const projectData = await getProjectData();
        await scaffolding.loadProject(projectData);
        
        // Hide loading screen before starting
        loadingScreen.hidden = true;
        
        // Force start
        scaffolding.start();
        console.log("Project started successfully.");
      } catch (err) {
        handleError(err);
      }
    };
    run();
  </script>
</body>
</html>
